<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScamSentry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="fraud-sentry-popup frame scan-mode" aria-live="polite">
        <header class="popup-header">
            <div class="brand-lockup" aria-label="ScamSentry">
                <img src="fraudsentry-logo.png" alt="" class="brand-mark" aria-hidden="true" />
                <span class="brand-logo">ScamSentry</span>
            </div>
            <button class="settings-btn" type="button" aria-label="Settings">
                <svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
                    <path d="M12 8.2a3.8 3.8 0 1 0 0 7.6 3.8 3.8 0 0 0 0-7.6Zm8.1 3.2-1.7-.5a6.8 6.8 0 0 0-.7-1.7l.8-1.6-2.1-2.1-1.6.8c-.5-.3-1.1-.5-1.7-.7L12.6 4H9.6l-.5 1.6c-.6.2-1.2.4-1.7.7l-1.6-.8-2.1 2.1.8 1.6c-.3.5-.5 1.1-.7 1.7l-1.7.5v3l1.7.5c.2.6.4 1.2.7 1.7l-.8 1.6 2.1 2.1 1.6-.8c.5.3 1.1.5 1.7.7l.5 1.6h3l.5-1.6c.6-.2 1.2-.4 1.7-.7l1.6.8 2.1-2.1-.8-1.6c.3-.5.5-1.1.7-1.7l1.7-.5v-3Z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                </svg>
            </button>
        </header>

        <div id="start-view" class="popup-view popup-view--start">
            <section class="score-section score-section--idle" aria-label="ScamSentry scan readiness">
                <div class="threat-ring-wrapper" aria-hidden="true">
                    <svg class="hex-ring" viewBox="0 0 200 200" width="200" height="200">
                        <polygon class="hex-frame" points="100,12 180,56 180,144 100,188 20,144 20,56" fill="none" stroke-width="1.5" />
                        <circle cx="100" cy="100" r="62" fill="none" stroke="#1a2332" stroke-width="10" />
                        <circle class="score-arc score-arc--idle" cx="100" cy="100" r="62" fill="none" stroke-width="10" stroke-linecap="round" stroke-dasharray="120 390" transform="rotate(-90 100 100)" />
                        <text x="100" y="96" text-anchor="middle" font-family="Orbitron" font-size="24" font-weight="800" fill="white">ARMED</text>
                        <text x="100" y="116" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#4a6274" letter-spacing="0">SCAN READY</text>
                    </svg>
                </div>
                <div class="verdict-badge" data-level="safe">
                    <span class="verdict-dot"></span>
                    <span class="verdict-text">ENGINE ACTIVE</span>
                </div>
            </section>

            <div class="url-strip">
                <svg class="url-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                    <path d="M10.4 13.6a4 4 0 0 0 5.7 0l2.6-2.6a4 4 0 0 0-5.7-5.7l-1.1 1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M13.6 10.4a4 4 0 0 0-5.7 0L5.3 13a4 4 0 1 0 5.7 5.7l1.1-1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span class="url-text" id="scanned-url">Awaiting active tab scan</span>
            </div>

            <section class="signals-panel">
                <div class="signals-header">THREAT SIGNALS</div>
                <ul class="signals-list">
                    <li class="signal-item signal-ok">
                        <span class="signal-icon">OK</span>
                        <span class="signal-msg">Manual scan mode armed</span>
                    </li>
                    <li class="signal-item signal-warn">
                        <span class="signal-icon">ID</span>
                        <span class="signal-msg">Page text and URL will be inspected locally</span>
                    </li>
                </ul>
            </section>

            <div class="action-bar">
                <button id="startScanBtn" class="btn btn-primary scan-button" type="button">SCAN</button>
            </div>
        </div>

        <div id="result-view" class="popup-view popup-view--result" style="display: none;">
            <section class="score-section" aria-label="Trust score">
                <div class="threat-ring-wrapper">
                    <svg class="hex-ring" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Threat score">
                        <polygon class="hex-frame hex-frame--outer" points="100,6 186,53 186,147 100,194 14,147 14,53" fill="none" stroke-width="0.8" />
                        <polygon class="hex-frame" points="100,12 180,56 180,144 100,188 20,144 20,56" fill="none" stroke-width="1.5" />
                        <polyline class="hex-circuit" points="36,62 68,44 88,44" fill="none" />
                        <polyline class="hex-circuit" points="164,138 132,156 112,156" fill="none" />
                        <circle cx="100" cy="100" r="62" fill="none" stroke="#1a2332" stroke-width="10" />
                        <circle id="score-arc" class="score-arc" cx="100" cy="100" r="62" fill="none" stroke-width="10" stroke-linecap="round" stroke-dasharray="0 390" transform="rotate(-90 100 100)" />
                        <text id="score-value" x="100" y="96" text-anchor="middle" font-family="Orbitron" font-size="28" font-weight="800" fill="white">--</text>
                        <text id="score-label" x="100" y="116" text-anchor="middle" font-family="JetBrains Mono" font-size="9" fill="#4a6274" letter-spacing="0">THREAT SCORE</text>
                    </svg>
                </div>
                <div class="verdict-badge" id="verdict-badge" data-level="suspicious">
                    <span class="verdict-dot"></span>
                    <span class="verdict-text" id="status-value">ANALYZING...</span>
                </div>
                <p class="verdict-copy" id="verdict-copy">Scanning threat posture...</p>
            </section>

            <div class="url-strip">
                <svg class="url-icon" viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
                    <path d="M10.4 13.6a4 4 0 0 0 5.7 0l2.6-2.6a4 4 0 0 0-5.7-5.7l-1.1 1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <path d="M13.6 10.4a4 4 0 0 0-5.7 0L5.3 13a4 4 0 1 0 5.7 5.7l1.1-1.1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
                <span class="url-text" id="result-url">Awaiting scan result</span>
            </div>

            <section class="signals-panel">
                <div class="signals-header">THREAT SIGNALS</div>
                <ul class="signals-list" id="signals-list">
                    <li class="signal-item signal-warn">
                        <span class="signal-icon">...</span>
                        <span class="signal-msg">Analyzing page content...</span>
                    </li>
                </ul>
            </section>

            <div class="last-scan-strip">
                <span>LAST SCAN</span>
                <strong id="last-scan-time">Pending</strong>
            </div>

            <div class="action-bar">
                <button class="btn btn-secondary" id="knowMoreBtn" type="button">KNOW MORE</button>
                <button class="btn btn-primary" id="rescanBtn" type="button">RESCAN</button>
            </div>
        </div>
    </main>
    <script src="popup.js"></script>
</body>
</html>
